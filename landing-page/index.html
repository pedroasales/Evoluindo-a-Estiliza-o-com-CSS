<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Landing Page</title>

    <!-- CSS EXTERNO -->
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/componentes.css">

    <!-- CSS INTERNO -->
    <style>
        h1 {
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>

    <!-- CABEÇALHO -->
    <header id="cabecalho">
        <h1 style="font-size: 10px;">Curso de Programação</h1>
    </header>

    <!-- HERO -->
    <section id="hero">
        <img src="img/hero.png" alt="Imagem principal">
    </section>

    <!-- CONTEÚDO -->
    <section class="conteudo">
        <h2>Sobre o Curso</h2>
        <p>Aprenda programação do zero até o avançado com aulas práticas.</p>
    </section>

    <section class="conteudo destaque">
        <h2>O que você vai aprender</h2>
        <ul>
            <li>HTML e CSS</li>
            <li>JavaScript</li>
            <li>Projetos reais</li>
        </ul>
    </section>

    <section class="conteudo">
        <h2>Aulas práticas</h2>

        <figure>
            <img src="img/aula.jpg" alt="Aula">
            <figcaption>Exemplo de aula prática</figcaption>
        </figure>

        <p>Conteúdo focado no mercado de trabalho.</p>

        <a href="#" class="botao">Inscreva-se</a>
    </section>

    <!-- RODAPÉ -->
    <footer id="rodape">
        <p>Contato: <a href="mailto:email@email.com">email@email.com</a></p>
    </footer>

</body>
</html>
